<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="weather-app">

        <header class="app-header">
            <div class="brand">
                <span class="brand-name">Atmos</span>
                <span class="brand-tag">Weather Intelligence</span>
            </div>
            <div class="search-container">
                <input type="text" id="location-input" placeholder="Search for a city…" autocomplete="off">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </header>

        <!-- Error -->
        <div id="error-box" class="error-box hidden">
            <i class="fas fa-exclamation-circle"></i>
            <span id="error-text">City not found. Please try again.</span>
        </div>

        <!-- Loader -->
        <div id="loader" class="loader hidden">
            <div class="spinner-ring"></div>
            <span>Fetching weather…</span>
        </div>

        <main class="weather-content" id="weather-content" style="display:none;">

            <!-- Hero -->
            <div class="hero-section">
                <div class="hero-left">
                    <p id="current-date" class="city-date">—</p>
                    <h2 id="city-name" class="city-name">—</h2>
                    <p id="weather-description" class="condition-text">—</p>
                    <div class="temp-row">
                        <span id="current-temp" class="temp-value">—</span>
                        <span class="temp-sup" id="unit-label">°C</span>
                    </div>
                    <div class="unit-toggle">
                        <button class="unit-btn active" id="btn-c" onclick="setUnit('c')">°C</button>
                        <button class="unit-btn" id="btn-f" onclick="setUnit('f')">°F</button>
                    </div>
                </div>
                <div class="hero-right">
                    <img id="weather-icon" src="" alt="Weather icon" class="weather-icon-img">
                    <div class="aqi-badge" id="aqi-badge"></div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon wind"><i class="fas fa-wind"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Wind</span>
                        <span class="stat-value"><span id="wind-speed">—</span> km/h</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon hum"><i class="fas fa-tint"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Humidity</span>
                        <span class="stat-value"><span id="humidity">—</span>%</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon vis"><i class="fas fa-eye"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Visibility</span>
                        <span class="stat-value"><span id="visibility">—</span> km</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon feels"><i class="fas fa-thermometer-half"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Feels Like</span>
                        <span class="stat-value"><span id="feels-like">—</span><span id="feels-unit">°C</span></span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon cloud"><i class="fas fa-cloud"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Cloud Cover</span>
                        <span class="stat-value"><span id="clouds">—</span>%</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon uv"><i class="fas fa-sun"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">UV Index</span>
                        <span class="stat-value"><span id="uv-index">—</span></span>
                    </div>
                </div>
            </div>

            <!-- Forecast -->
            <div class="forecast-container">
                <p class="section-title">5-Day Forecast</p>
                <div class="forecast-days" id="forecast-days"></div>
            </div>

        </main>

        <footer class="app-footer">
            <p>Powered by <a href="https://www.weatherapi.com/" target="_blank">WeatherAPI.com</a></p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
